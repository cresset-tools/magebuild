name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run when the same ref gets a newer push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      # macOS runners no longer ship a usable cargo on PATH, so install the
      # toolchain explicitly. rust-toolchain.toml pins the channel + components
      # and is read by this action. `cache-bin: false` avoids a recurring macOS
      # failure where the cached `~/.cargo/bin/cargo` was the rustup-init
      # multiplexer rather than the cargo proxy.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false

      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --all-targets

      - name: cargo test
        run: cargo test

  # fmt + clippy gate. Unlike magequery, magebuild is a plain single crate with
  # no hand-aligned tables, so it holds the standard formatting/lint bar.
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
